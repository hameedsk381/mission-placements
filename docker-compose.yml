version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mission-placements-db
    restart: always
    environment:
      - POSTGRES_USER=mission_user
      - POSTGRES_PASSWORD=mission_password
      - POSTGRES_DB=mission_placements
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mission_user -d mission_placements"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mission-placements-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://mission_user:mission_password@db:5432/mission_placements?schema=public
      - AUTH_SECRET=your-production-secret-here
      - AUTH_URL=http://localhost:3000
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
